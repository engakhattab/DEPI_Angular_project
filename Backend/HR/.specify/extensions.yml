## SAFE REPOSITORY MODE — All git-write hooks disabled
## Policy: speckit-safe-repository-policy-v1
## Date: 2026-05-22
## Reason: Prevent autonomous Git modifications (commits, branches, init)

installed:
- git
settings:
  auto_execute_hooks: false  # GLOBAL KILL SWITCH — no hooks auto-execute
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: false  # DISABLED — Safe Repository Mode
    optional: false
    prompt: Execute speckit.git.initialize?
    description: "[BLOCKED] Initialize Git repository before constitution setup"
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: false  # DISABLED — Safe Repository Mode
    optional: false
    prompt: Execute speckit.git.feature?
    description: "[BLOCKED] Create feature branch before specification"
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: "[BLOCKED] Auto-commit before spec clarification"
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit outstanding changes before planning?
    description: "[BLOCKED] Auto-commit before implementation planning"
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: "[BLOCKED] Auto-commit before task generation"
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: "[BLOCKED] Auto-commit before implementation"
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: "[BLOCKED] Auto-commit before checklist generation"
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: "[BLOCKED] Auto-commit before analysis"
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: "[BLOCKED] Auto-commit before tasks-to-issues conversion"
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit constitution changes?
    description: "[BLOCKED] Auto-commit after constitution update"
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit specification changes?
    description: "[BLOCKED] Auto-commit after specification"
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit clarification changes?
    description: "[BLOCKED] Auto-commit after spec clarification"
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit plan changes?
    description: "[BLOCKED] Auto-commit after implementation planning"
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: false  # DISABLED — Safe Repository Mode
    optional: true
    prompt: Commit task changes?
    description: "[BLOCKED] Auto-commit after task generation"
    condition: null
  after_implement:
